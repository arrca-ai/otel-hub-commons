// bus/bus.proto
syntax = "proto3";
package bus;
option go_package = "github.com/arrca-ai/otel-hub-commons/bus";

message SpanEvent {
  string name = 1;
  uint64 time_nano = 2;
  map<string, string> attrs = 3;
}

message Span {
  string trace_id = 1;
  string span_id = 2;
  string parent_id = 3;
  string name = 4;
  string kind = 5;
  uint64 start_nano = 6;
  uint64 end_nano = 7;
  string status_code = 8;
  map<string, string> attrs = 9;
  map<string, string> resource_attrs = 10;
  string status_message = 11;
  repeated SpanEvent events = 12;
}

message AssembledTrace {
  string trace_id = 1;
  repeated Span spans = 2;
  bool connected = 3;
}

// CanonicalizedTrace pairs a finalized trace with the canonical flow it
// collapsed into: root_hash is the flow id (canonical Merkle root), trace is
// the original timed spans verbatim, and span_node_hashes maps each span_id to
// the hash of the canonical node it produced. Many spans (retries / fan-out)
// may share one node hash — that is the intended structural grouping.
message CanonicalizedTrace {
  string root_hash = 1;
  AssembledTrace trace = 2;
  map<string, string> span_node_hashes = 3;
}

// K8sEntityEvent is a Kubernetes control-plane state transition observed by
// graph-k8s and published to NATS, partitioned by hash(entity_id) % N. kind is
// one of "pod_restart" | "phase_change" | "image_change".
message K8sEntityEvent {
  string entity_id = 1;   // partition key: "pod:ns/name" | "deployment:ns/name"
  string kind      = 2;
  int64  ts_ms     = 3;   // observation time, ms since epoch
  string namespace = 4;
  string container = 5;   // restart / pod-image events; empty otherwise
  string old_value = 6;   // prev phase / restart count / old image
  string new_value = 7;   // new phase / restart count / new image
  string reason    = 8;   // lastState.terminated.reason; empty otherwise
  string pod       = 9;   // pod name for pod-scoped events; empty otherwise
}
